# CPA-Claude — native Anthropic Claude proxy configuration.

host: "0.0.0.0"
port: 8317
log_level: info

# Directory containing per-credential OAuth JSON files (one per Claude account).
# Each file may declare its own proxy URL and max_concurrent.
auth_dir: ./auths

# Persistent usage statistics. Survives restarts.
state_file: ./state.json

# Per-request JSONL log (one line per terminal request). Writes to
# log_dir/requests-YYYY-MM-DD.jsonl, rotated daily, retained 90 days by
# default. Omit log_dir to disable.
log_dir: ./logs
log_retention_days: 90

# Minutes of inactivity after which a client session releases its OAuth slot.
active_window_minutes: 10

# Use uTLS (Chrome fingerprint) for all upstream calls. Recommended, since
# Anthropic edge fingerprint-checks non-browser clients.
use_utls: true

# Default upstream proxy. Applied to OAuth files that do not specify one.
# Leave empty for direct connection.
default_proxy_url: ""

# Override Anthropic base URL (normally leave default).
anthropic_base_url: "https://api.anthropic.com"

# Admin panel token. If set, the SPA is served under admin_path and
# protected by this token (X-Admin-Token header). Leave empty to disable
# the panel.
admin_token: "change-me-long-random-string"

# URL prefix for the management panel. Changing this from the default
# makes trivial /admin-style dictionary scans miss the panel. Must start
# with "/" and not end with "/". Default: /mgmt-console.
# admin_path: /mgmt-console

# Client access tokens are managed exclusively via the admin panel and
# persisted in tokens.json (next to state_file). The legacy access_tokens
# block is no longer used; if it's still present at startup, entries are
# migrated into tokens.json and stripped from this file automatically.

# Pricing table. Built-in defaults already cover:
#   claude-haiku-4-5-20251001, claude-haiku-4-5
#   claude-opus-4-6
#   claude-sonnet-4-6
# You only need this block to override or add new models. Unlisted models
# fall back to `default` (currently Sonnet pricing).
# pricing:
#   default:
#     input_per_1m: 3.00
#     output_per_1m: 15.00
#     cache_read_per_1m: 0.30
#     cache_create_per_1m: 3.75
#   models:
#     claude-custom:
#       input_per_1m: 2.0
#       output_per_1m: 10.0
#       cache_read_per_1m: 0.2
#       cache_create_per_1m: 2.5

# API-key fallback pool. Used when every OAuth file is saturated or
# unavailable. API keys have no concurrency limit.
api_keys:
  - key: "sk-ant-api03-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    label: "primary"
    proxy_url: ""

  # Third-party relay vendor with quirky model names. base_url overrides the
  # upstream host; model_map both routes (this key only handles the listed
  # client model names) and rewrites the request body's "model" field before
  # forwarding. Empty value = accept the model name without rewriting.
  # Same fields are editable per-key from the admin panel.
  # - key: "sk-relayvendor-xxx"
  #   label: "relay-A"
  #   base_url: "https://az.zlapi.pro"
  #   group: ""                # public; or e.g. "premium"
  #   model_map:
  #     claude-opus-4-6:    "[0.16]稳定喵/claude-opus-4-6"
  #     claude-sonnet-4-6:  "[0.1]高质量喵/claude-sonnet-4-6"
  #     claude-haiku-4-5:   "[aws按量]cf逆/claude-haiku-4-5-20251001"
