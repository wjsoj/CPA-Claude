<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPA-Claude Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
    [hidden] { display: none !important; }
    .badge { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    details>summary { list-style:none; cursor:pointer; }
    details>summary::-webkit-details-marker { display:none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="app"></div>

  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.24.3";
    import { useState, useEffect, useCallback, useRef } from "https://esm.sh/preact@10.24.3/hooks";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(h);

    const TOKEN_KEY = "cpa.admin.token";
    const getToken = () => localStorage.getItem(TOKEN_KEY) || "";
    const setToken = (t) => { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); };

    async function api(path, opts = {}) {
      const token = getToken();
      const res = await fetch(path, {
        ...opts,
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": token,
          ...(opts.headers || {}),
        },
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
      if (!res.ok) {
        const err = new Error((data && data.error) || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    const fmtInt = (n) => (n == null ? "—" : Number(n).toLocaleString());
    const fmtDate = (s) => {
      if (!s) return "—";
      const d = new Date(s);
      if (isNaN(d)) return "—";
      const diff = d.getTime() - Date.now();
      const abs = Math.abs(diff);
      const m = Math.round(abs / 60000);
      const h_ = Math.round(abs / 3600000);
      const day = Math.round(abs / 86400000);
      let rel = "";
      if (abs < 60000) rel = "now";
      else if (m < 60) rel = `${m}m`;
      else if (h_ < 48) rel = `${h_}h`;
      else rel = `${day}d`;
      return diff < 0 ? `${rel} ago` : `in ${rel}`;
    };

    function Login({ onOk }) {
      const [val, setVal] = useState("");
      const [err, setErr] = useState("");
      const submit = async (e) => {
        e.preventDefault();
        setErr("");
        setToken(val.trim());
        try {
          await api("/admin/api/summary");
          onOk();
        } catch (x) {
          setToken("");
          setErr(x.message || "auth failed");
        }
      };
      return html`
        <div class="min-h-screen flex items-center justify-center p-6">
          <form onSubmit=${submit} class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-sm space-y-4 border border-slate-200">
            <h1 class="text-xl font-semibold">CPA-Claude Admin</h1>
            <p class="text-sm text-slate-500">Enter admin token to continue.</p>
            <input
              type="password" autofocus
              class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-400"
              placeholder="admin token"
              value=${val}
              onInput=${(e) => setVal(e.target.value)}
            />
            ${err && html`<div class="text-sm text-red-600">${err}</div>`}
            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 rounded-lg">Sign in</button>
          </form>
        </div>
      `;
    }

    function Badge({ color = "slate", children }) {
      const palette = {
        slate: "bg-slate-100 text-slate-700",
        green: "bg-emerald-100 text-emerald-700",
        red:   "bg-red-100 text-red-700",
        amber: "bg-amber-100 text-amber-800",
        blue:  "bg-blue-100 text-blue-700",
      };
      return html`<span class="badge ${palette[color] || palette.slate}">${children}</span>`;
    }

    function EditModal({ auth, onClose, onSaved }) {
      const [disabled, setDisabled] = useState(auth.disabled);
      const [maxC, setMaxC] = useState(auth.max_concurrent || 0);
      const [proxy, setProxy] = useState(auth.proxy_url || "");
      const [label, setLabel] = useState(auth.label || "");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const save = async () => {
        setBusy(true); setErr("");
        try {
          await api(`/admin/api/auths/${encodeURIComponent(auth.id)}`, {
            method: "PATCH",
            body: JSON.stringify({
              disabled, max_concurrent: Number(maxC), proxy_url: proxy, label,
            }),
          });
          onSaved();
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      };
      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick=${onClose}>
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-center justify-between">
              <h2 class="text-lg font-semibold">Edit credential</h2>
              <button onClick=${onClose} class="text-slate-400 hover:text-slate-700">✕</button>
            </div>
            <div class="text-xs mono text-slate-500">${auth.id}</div>
            <label class="block">
              <span class="text-sm text-slate-600">Label</span>
              <input class="mt-1 w-full border rounded-lg px-3 py-2" value=${label} onInput=${(e)=>setLabel(e.target.value)} />
            </label>
            <label class="block">
              <span class="text-sm text-slate-600">Max concurrent sessions</span>
              <input type="number" min="0" class="mt-1 w-full border rounded-lg px-3 py-2" value=${maxC} onInput=${(e)=>setMaxC(e.target.value)} />
              <span class="text-xs text-slate-400">0 = unlimited</span>
            </label>
            <label class="block">
              <span class="text-sm text-slate-600">Proxy URL</span>
              <input class="mt-1 w-full border rounded-lg px-3 py-2 mono" placeholder="http://host:port or socks5://host:port" value=${proxy} onInput=${(e)=>setProxy(e.target.value)} />
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" checked=${disabled} onChange=${(e)=>setDisabled(e.target.checked)} />
              <span class="text-sm">Disabled</span>
            </label>
            ${err && html`<div class="text-sm text-red-600">${err}</div>`}
            <div class="flex justify-end gap-2 pt-2">
              <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Cancel</button>
              <button disabled=${busy} onClick=${save} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white disabled:opacity-50">${busy ? "Saving..." : "Save"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function UploadModal({ onClose, onSaved }) {
      const [filename, setFilename] = useState("");
      const [content, setContent] = useState("");
      const [label, setLabel] = useState("");
      const [maxC, setMaxC] = useState(5);
      const [proxy, setProxy] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const fileInputRef = useRef(null);

      const onPick = () => fileInputRef.current && fileInputRef.current.click();
      const onFile = async (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        setFilename(f.name);
        setContent(await f.text());
      };
      const save = async () => {
        setBusy(true); setErr("");
        try {
          JSON.parse(content); // validate
          await api("/admin/api/auths/upload", {
            method: "POST",
            body: JSON.stringify({
              filename, content: JSON.parse(content),
              label, max_concurrent: Number(maxC), proxy_url: proxy,
            }),
          });
          onSaved();
        } catch (x) { setErr(x.message || String(x)); }
        finally { setBusy(false); }
      };
      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick=${onClose}>
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-center justify-between">
              <h2 class="text-lg font-semibold">Add OAuth credential</h2>
              <button onClick=${onClose} class="text-slate-400 hover:text-slate-700">✕</button>
            </div>
            <input type="file" accept=".json,application/json" ref=${fileInputRef} onChange=${onFile} class="hidden" />
            <div class="flex gap-2">
              <button onClick=${onPick} class="px-3 py-1.5 rounded-lg border border-slate-300 text-sm hover:bg-slate-50">Choose JSON file…</button>
              <input class="flex-1 border rounded-lg px-3 py-2 mono text-sm" placeholder="filename (optional)" value=${filename} onInput=${(e)=>setFilename(e.target.value)} />
            </div>
            <label class="block">
              <span class="text-sm text-slate-600">or paste JSON</span>
              <textarea class="mt-1 w-full border rounded-lg px-3 py-2 mono h-40" value=${content} onInput=${(e)=>setContent(e.target.value)} placeholder='{"type":"claude","access_token":"...","refresh_token":"...","email":"..."}'></textarea>
            </label>
            <div class="grid grid-cols-2 gap-3">
              <label class="block">
                <span class="text-sm text-slate-600">Label</span>
                <input class="mt-1 w-full border rounded-lg px-3 py-2" value=${label} onInput=${(e)=>setLabel(e.target.value)} />
              </label>
              <label class="block">
                <span class="text-sm text-slate-600">Max concurrent</span>
                <input type="number" min="0" class="mt-1 w-full border rounded-lg px-3 py-2" value=${maxC} onInput=${(e)=>setMaxC(e.target.value)} />
              </label>
            </div>
            <label class="block">
              <span class="text-sm text-slate-600">Proxy URL (optional)</span>
              <input class="mt-1 w-full border rounded-lg px-3 py-2 mono" placeholder="http:// or socks5://" value=${proxy} onInput=${(e)=>setProxy(e.target.value)} />
            </label>
            ${err && html`<div class="text-sm text-red-600 whitespace-pre-wrap">${err}</div>`}
            <div class="flex justify-end gap-2 pt-2">
              <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Cancel</button>
              <button disabled=${busy || !content} onClick=${save} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white disabled:opacity-50">${busy ? "Uploading..." : "Add"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function RequestsExplorer() {
      const today = new Date().toISOString().slice(0, 10);
      const sevenAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
      const [from, setFrom] = useState(sevenAgo);
      const [to, setTo] = useState(today);
      const [client, setClient] = useState("");
      const [model, setModel] = useState("");
      const [limit, setLimit] = useState(200);
      const [clientsList, setClientsList] = useState([]);
      const [data, setData] = useState(null);
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);

      const loadClients = useCallback(async () => {
        try {
          const d = await api("/admin/api/requests/clients");
          setClientsList(d.clients || []);
        } catch {}
      }, []);
      useEffect(() => { loadClients(); }, [loadClients]);

      const run = useCallback(async () => {
        setBusy(true); setErr("");
        try {
          const qs = new URLSearchParams();
          if (from) qs.set("from", from);
          if (to) qs.set("to", to);
          if (client) qs.set("client", client);
          if (model) qs.set("model", model);
          if (limit) qs.set("limit", String(limit));
          const d = await api("/admin/api/requests?" + qs.toString());
          setData(d);
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      }, [from, to, client, model, limit]);

      useEffect(() => { run(); /* initial run */ }, []); // eslint-disable-line

      const cost = (v) => "$" + (v || 0).toFixed(4);
      const renderAgg = (a) => html`
        <span class="mono">${fmtInt(a.count)}</span> req · <span class="mono">${cost(a.cost_usd)}</span>
        <span class="text-slate-500"> (in ${fmtInt(a.input_tokens)}/out ${fmtInt(a.output_tokens)})</span>
        ${a.errors > 0 && html`<span class="text-red-600"> · ${fmtInt(a.errors)} err</span>`}
      `;

      const sortedByClient = data ? Object.entries(data.by_client).sort(([,a],[,b]) => b.cost_usd - a.cost_usd) : [];
      const sortedByModel  = data ? Object.entries(data.by_model).sort(([,a],[,b]) => b.cost_usd - a.cost_usd) : [];
      const sortedByDay    = data ? Object.entries(data.by_day).sort(([a],[b]) => a.localeCompare(b)) : [];

      // derive models list from current data for the filter dropdown
      const modelsList = data ? Object.keys(data.by_model).sort() : [];

      const maxDayCost = Math.max(1e-9, ...sortedByDay.map(([, a]) => a.cost_usd));

      return html`
        <section class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-4 py-2 border-b border-slate-200 flex items-center justify-between">
            <h2 class="font-semibold">Requests</h2>
            <span class="text-xs text-slate-400">${data ? `${fmtInt(data.scanned)} lines scanned · ${fmtInt(data.summary.count)} match` : ""}</span>
          </div>
          <div class="p-4 grid grid-cols-1 md:grid-cols-6 gap-3 items-end border-b border-slate-100">
            <label class="block">
              <span class="text-xs text-slate-500">From</span>
              <input type="date" class="mt-1 w-full border rounded-lg px-2 py-1.5" value=${from} onInput=${(e) => setFrom(e.target.value)} />
            </label>
            <label class="block">
              <span class="text-xs text-slate-500">To</span>
              <input type="date" class="mt-1 w-full border rounded-lg px-2 py-1.5" value=${to} onInput=${(e) => setTo(e.target.value)} />
            </label>
            <label class="block">
              <span class="text-xs text-slate-500">Client</span>
              <select class="mt-1 w-full border rounded-lg px-2 py-1.5" value=${client} onChange=${(e) => setClient(e.target.value)}>
                <option value="">(any)</option>
                ${clientsList.map((c) => html`<option value=${c}>${c}</option>`)}
              </select>
            </label>
            <label class="block">
              <span class="text-xs text-slate-500">Model</span>
              <select class="mt-1 w-full border rounded-lg px-2 py-1.5" value=${model} onChange=${(e) => setModel(e.target.value)}>
                <option value="">(any)</option>
                ${modelsList.map((m) => html`<option value=${m}>${m}</option>`)}
              </select>
            </label>
            <label class="block">
              <span class="text-xs text-slate-500">Entry limit</span>
              <input type="number" min="1" max="5000" class="mt-1 w-full border rounded-lg px-2 py-1.5 mono text-xs" value=${limit} onInput=${(e) => setLimit(e.target.value)} />
            </label>
            <button disabled=${busy} onClick=${run} class="px-3 py-1.5 rounded-lg bg-slate-900 text-white hover:bg-slate-800 disabled:opacity-50">${busy ? "…" : "Query"}</button>
          </div>

          ${err && html`<div class="p-3 bg-red-50 text-red-700 text-sm">${err}</div>`}

          ${data && html`
            <div class="p-4 grid grid-cols-2 md:grid-cols-5 gap-3 bg-slate-50 border-b border-slate-100">
              ${[
                ["Requests", fmtInt(data.summary.count)],
                ["Total $", cost(data.summary.cost_usd)],
                ["Input", fmtInt(data.summary.input_tokens)],
                ["Output", fmtInt(data.summary.output_tokens)],
                ["Errors", fmtInt(data.summary.errors)],
              ].map(([k, v]) => html`
                <div class="bg-white rounded-lg border border-slate-200 px-3 py-2">
                  <div class="text-[11px] text-slate-500">${k}</div>
                  <div class="text-lg font-semibold">${v}</div>
                </div>
              `)}
            </div>
          `}

          ${data && sortedByDay.length > 0 && html`
            <div class="p-4 border-b border-slate-100">
              <div class="text-sm font-medium text-slate-700 mb-2">Daily cost</div>
              <div class="flex items-end gap-[3px] h-16">
                ${sortedByDay.map(([day, a]) => {
                  const pct = Math.round((a.cost_usd / maxDayCost) * 100);
                  const title = `${day}: ${cost(a.cost_usd)} · ${fmtInt(a.count)} req`;
                  return html`<div class="flex-1 min-w-[6px] flex flex-col items-stretch justify-end">
                    <div title=${title} class="bg-slate-700 rounded-sm" style=${"height:" + Math.max(pct, a.cost_usd > 0 ? 4 : 1) + "%"}></div>
                  </div>`;
                })}
              </div>
              <div class="flex justify-between mt-1 text-[10px] text-slate-400 mono">
                <span>${sortedByDay[0][0]}</span>
                <span>${sortedByDay[sortedByDay.length - 1][0]}</span>
              </div>
            </div>
          `}

          ${data && html`
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 border-b border-slate-100">
              <div>
                <div class="text-sm font-medium text-slate-700 mb-2">By client</div>
                ${sortedByClient.length === 0 ? html`<div class="text-xs text-slate-400">—</div>` :
                  html`<table class="w-full text-xs">
                    ${sortedByClient.map(([k, a]) => html`
                      <tr class="border-b border-slate-100">
                        <td class="py-1.5 pr-3 font-medium">${k || html`<span class="text-slate-400">(unnamed)</span>`}</td>
                        <td class="py-1.5 mono text-right">${cost(a.cost_usd)}</td>
                        <td class="py-1.5 mono text-right text-slate-500 w-20">${fmtInt(a.count)} req</td>
                      </tr>
                    `)}
                  </table>`}
              </div>
              <div>
                <div class="text-sm font-medium text-slate-700 mb-2">By model</div>
                ${sortedByModel.length === 0 ? html`<div class="text-xs text-slate-400">—</div>` :
                  html`<table class="w-full text-xs">
                    ${sortedByModel.map(([k, a]) => html`
                      <tr class="border-b border-slate-100">
                        <td class="py-1.5 pr-3 mono">${k}</td>
                        <td class="py-1.5 mono text-right">${cost(a.cost_usd)}</td>
                        <td class="py-1.5 mono text-right text-slate-500 w-20">${fmtInt(a.count)} req</td>
                      </tr>
                    `)}
                  </table>`}
              </div>
            </div>
          `}

          ${data && data.entries && data.entries.length > 0 && html`
            <div class="p-4">
              <div class="text-sm font-medium text-slate-700 mb-2">Recent matching entries</div>
              <div class="overflow-x-auto">
                <table class="w-full text-xs">
                  <thead class="text-left text-[10px] uppercase text-slate-500 border-b border-slate-200">
                    <tr>
                      <th class="py-2 pr-2">Time (UTC)</th>
                      <th class="py-2 pr-2">Client</th>
                      <th class="py-2 pr-2">Model</th>
                      <th class="py-2 pr-2">Auth</th>
                      <th class="py-2 pr-2 text-right">In</th>
                      <th class="py-2 pr-2 text-right">Out</th>
                      <th class="py-2 pr-2 text-right">Cost</th>
                      <th class="py-2 pr-2 text-right">Status</th>
                      <th class="py-2 pr-2 text-right">Dur</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${data.entries.slice(0, limit).map((r, i) => html`
                      <tr class=${"border-b border-slate-50 " + (r.status >= 400 ? "bg-red-50/40" : "")} key=${i}>
                        <td class="py-1 pr-2 mono text-slate-500">${r.ts.replace("T"," ").slice(0,19)}</td>
                        <td class="py-1 pr-2">${r.client || html`<span class="text-slate-400">(—)</span>`}</td>
                        <td class="py-1 pr-2 mono">${r.model}</td>
                        <td class="py-1 pr-2 mono text-[10px] text-slate-500">${r.auth_label || r.auth_id}</td>
                        <td class="py-1 pr-2 mono text-right">${fmtInt(r.input_tokens)}</td>
                        <td class="py-1 pr-2 mono text-right">${fmtInt(r.output_tokens)}</td>
                        <td class="py-1 pr-2 mono text-right">${cost(r.cost_usd)}</td>
                        <td class=${"py-1 pr-2 mono text-right " + (r.status >= 400 ? "text-red-600" : "")}>${r.status}</td>
                        <td class="py-1 pr-2 mono text-right text-slate-500">${r.duration_ms}ms</td>
                      </tr>
                    `)}
                  </tbody>
                </table>
              </div>
            </div>
          `}
        </section>
      `;
    }

    function Sparkline({ daily }) {
      // Fill missing days with zero so the sparkline width reflects real
      // elapsed time, not just days with activity.
      const map = Object.fromEntries(daily.map((d) => [d.date, d.counts]));
      const end = daily[daily.length - 1].date;
      const days = 14;
      const out = [];
      const endD = new Date(end + "T00:00:00Z");
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(endD);
        d.setUTCDate(endD.getUTCDate() - i);
        const key = d.toISOString().slice(0, 10);
        const c = map[key] || { input_tokens: 0, output_tokens: 0 };
        out.push({ date: key, val: (c.input_tokens || 0) + (c.output_tokens || 0) });
      }
      const max = Math.max(1, ...out.map((o) => o.val));
      return html`
        <div class="flex items-end gap-[2px] h-10 w-[88px]">
          ${out.map((o) => {
            const pct = Math.round((o.val / max) * 100);
            const hStyle = `height:${Math.max(pct, o.val > 0 ? 6 : 2)}%`;
            const title = `${o.date}: ${o.val.toLocaleString()} tokens`;
            return html`<div
              title=${title}
              class=${"w-[4px] rounded-sm " + (o.val > 0 ? "bg-slate-700" : "bg-slate-200")}
              style=${hStyle}
            ></div>`;
          })}
        </div>
      `;
    }

    function OAuthModal({ onClose, onSaved }) {
      const [step, setStep] = useState(1); // 1 = form, 2 = waiting-for-callback
      const [proxy, setProxy] = useState("");
      const [label, setLabel] = useState("");
      const [maxC, setMaxC] = useState(5);
      const [sess, setSess] = useState(null); // {session_id, auth_url}
      const [callback, setCallback] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");

      const [copied, setCopied] = useState(false);

      const start = async () => {
        setBusy(true); setErr("");
        try {
          const d = await api("/admin/api/oauth/start", {
            method: "POST",
            body: JSON.stringify({ proxy_url: proxy, label }),
          });
          setSess(d);
          setStep(2);
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      };

      const copyUrl = async () => {
        try {
          await navigator.clipboard.writeText(sess.auth_url);
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        } catch {
          // fallback: select the input so user can copy manually
        }
      };

      const finish = async () => {
        setBusy(true); setErr("");
        try {
          await api("/admin/api/oauth/finish", {
            method: "POST",
            body: JSON.stringify({
              session_id: sess.session_id,
              callback: callback.trim(),
              max_concurrent: Number(maxC),
            }),
          });
          onSaved();
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      };

      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick=${onClose}>
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-center justify-between">
              <h2 class="text-lg font-semibold">Sign in with Claude</h2>
              <button onClick=${onClose} class="text-slate-400 hover:text-slate-700">✕</button>
            </div>

            ${step === 1 && html`
              <p class="text-sm text-slate-500">We'll open Claude's OAuth page in a new tab. If this server is behind a firewall to <code class="mono">claude.ai / api.anthropic.com</code>, set a proxy URL below — it will be used both for the token exchange and for all subsequent requests made with this credential.</p>
              <label class="block">
                <span class="text-sm text-slate-600">Proxy URL (optional)</span>
                <input class="mt-1 w-full border rounded-lg px-3 py-2 mono" placeholder="http:// or socks5://" value=${proxy} onInput=${(e) => setProxy(e.target.value)} />
              </label>
              <div class="grid grid-cols-2 gap-3">
                <label class="block">
                  <span class="text-sm text-slate-600">Label</span>
                  <input class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="team-a / alice / …" value=${label} onInput=${(e) => setLabel(e.target.value)} />
                </label>
                <label class="block">
                  <span class="text-sm text-slate-600">Max concurrent</span>
                  <input type="number" min="0" class="mt-1 w-full border rounded-lg px-3 py-2" value=${maxC} onInput=${(e) => setMaxC(e.target.value)} />
                </label>
              </div>
              ${err && html`<div class="text-sm text-red-600">${err}</div>`}
              <div class="flex justify-end gap-2 pt-2">
                <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Cancel</button>
                <button disabled=${busy} onClick=${start} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white disabled:opacity-50">${busy ? "Starting..." : "Open Claude login"}</button>
              </div>
            `}

            ${step === 2 && html`
              <div class="text-sm text-slate-600 space-y-2">
                <p><b>Step 1.</b> Copy the login URL below and open it in a browser where you can sign in to Claude.</p>
              </div>
              <label class="block">
                <span class="text-sm text-slate-600">Login URL</span>
                <div class="mt-1 flex gap-2">
                  <input
                    readonly
                    onClick=${(e) => e.target.select()}
                    class="flex-1 border rounded-lg px-3 py-2 mono text-xs bg-slate-50"
                    value=${sess.auth_url}
                  />
                  <button onClick=${copyUrl} class="px-3 py-2 rounded-lg border border-slate-300 text-sm hover:bg-slate-50 whitespace-nowrap">${copied ? "Copied ✓" : "Copy"}</button>
                </div>
              </label>

              <div class="text-sm text-slate-600 space-y-2 pt-2">
                <p><b>Step 2.</b> After you authorize, Claude redirects to
                <code class="mono break-all">http://localhost:54545/callback?code=…&amp;state=…</code>.
                That page normally fails to load — <b>that's fine</b>.</p>
                <p><b>Step 3.</b> Copy the <b>full URL from the browser address bar</b>
                (or the <code class="mono">code#state</code> value Claude shows on its
                manual-copy page) and paste it below.</p>
              </div>
              <label class="block">
                <span class="text-sm text-slate-600">Callback URL or code#state</span>
                <textarea
                  class="mt-1 w-full border rounded-lg px-3 py-2 mono text-xs h-28"
                  placeholder="http://localhost:54545/callback?code=xxxxx&state=yyyyy"
                  value=${callback}
                  onInput=${(e) => setCallback(e.target.value)}
                ></textarea>
              </label>
              ${err && html`<div class="text-sm text-red-600 whitespace-pre-wrap">${err}</div>`}
              <div class="flex justify-end gap-2 pt-2">
                <button onClick=${() => setStep(1)} class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50">Back</button>
                <button disabled=${busy || !callback.trim()} onClick=${finish} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white disabled:opacity-50">${busy ? "Exchanging..." : "Finish"}</button>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function AuthRow({ a, onAction, onEdit }) {
      const slot = a.max_concurrent > 0 ? `${a.active_clients}/${a.max_concurrent}` : `${a.active_clients}/∞`;
      let status;
      if (a.disabled) status = html`<${Badge} color="slate">disabled<//>`;
      else if (a.quota_exceeded) status = html`<${Badge} color="amber">quota<//>`;
      else status = html`<${Badge} color="green">active<//>`;
      const u = a.usage && a.usage.total;
      return html`
        <tr class="border-b border-slate-100 hover:bg-slate-50/60">
          <td class="py-3 px-3">
            <div class="font-medium">${a.label || a.id}</div>
            <div class="mono text-slate-400 text-[11px]">${a.id}</div>
            ${a.email && html`<div class="text-xs text-slate-500">${a.email}</div>`}
          </td>
          <td class="py-3 px-3">
            <${Badge} color=${a.kind === "apikey" ? "blue" : "slate"}>${a.kind}<//>
            <div class="mt-1">${status}</div>
          </td>
          <td class="py-3 px-3 mono">${slot}</td>
          <td class="py-3 px-3 mono text-xs">${a.proxy_url || html`<span class="text-slate-400">—</span>`}</td>
          <td class="py-3 px-3 text-xs">${a.expires_at ? fmtDate(a.expires_at) : html`<span class="text-slate-400">—</span>`}</td>
          <td class="py-3 px-3 mono text-xs">
            ${u ? html`
              <div>in: ${fmtInt(u.total.input_tokens)}</div>
              <div>out: ${fmtInt(u.total.output_tokens)}</div>
              <div class="text-slate-500">req: ${fmtInt(u.total.requests)} / err: ${fmtInt(u.total.errors)}</div>
            ` : html`<span class="text-slate-400">—</span>`}
          </td>
          <td class="py-3 px-3 mono text-xs">
            ${u ? html`
              <div>in: ${fmtInt(u.sum_24h.input_tokens)}</div>
              <div>out: ${fmtInt(u.sum_24h.output_tokens)}</div>
              <div class="text-slate-500">req: ${fmtInt(u.sum_24h.requests)}</div>
            ` : html`<span class="text-slate-400">—</span>`}
          </td>
          <td class="py-3 px-3">
            ${u && u.daily && u.daily.length ? html`<${Sparkline} daily=${u.daily} />` : html`<span class="text-slate-400 text-xs">—</span>`}
          </td>
          <td class="py-3 px-3">
            <div class="flex gap-1 flex-wrap justify-end">
              ${a.kind === "oauth" && html`
                <button onClick=${() => onEdit(a)} class="text-xs px-2 py-1 rounded border border-slate-300 hover:bg-slate-100">Edit</button>
                <button onClick=${() => onAction(a, "toggle")} class="text-xs px-2 py-1 rounded border border-slate-300 hover:bg-slate-100">${a.disabled ? "Enable" : "Disable"}</button>
                <button onClick=${() => onAction(a, "refresh")} class="text-xs px-2 py-1 rounded border border-slate-300 hover:bg-slate-100">Refresh</button>
                ${a.quota_exceeded && html`<button onClick=${() => onAction(a, "clear-quota")} class="text-xs px-2 py-1 rounded border border-amber-400 text-amber-700 hover:bg-amber-50">Clear quota</button>`}
                <button onClick=${() => onAction(a, "delete")} class="text-xs px-2 py-1 rounded border border-red-300 text-red-600 hover:bg-red-50">Delete</button>
              `}
              ${a.kind === "apikey" && html`
                ${a.quota_exceeded && html`<button onClick=${() => onAction(a, "clear-quota")} class="text-xs px-2 py-1 rounded border border-amber-400 text-amber-700 hover:bg-amber-50">Clear quota</button>`}
              `}
            </div>
          </td>
        </tr>
      `;
    }

    function Dashboard({ onLogout }) {
      const [data, setData] = useState(null);
      const [err, setErr] = useState("");
      const [editing, setEditing] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [oauthing, setOauthing] = useState(false);
      const [lastTick, setLastTick] = useState(Date.now());

      const refresh = useCallback(async () => {
        try {
          const d = await api("/admin/api/summary");
          setData(d); setErr(""); setLastTick(Date.now());
        } catch (x) {
          if (x.status === 401) { setToken(""); onLogout(); return; }
          setErr(x.message);
        }
      }, [onLogout]);

      useEffect(() => { refresh(); const t = setInterval(refresh, 10000); return () => clearInterval(t); }, [refresh]);

      const onAction = async (a, act) => {
        try {
          if (act === "toggle") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}`, {
              method: "PATCH",
              body: JSON.stringify({ disabled: !a.disabled }),
            });
          } else if (act === "refresh") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}/refresh`, { method: "POST" });
          } else if (act === "clear-quota") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}/clear-quota`, { method: "POST" });
          } else if (act === "delete") {
            if (!confirm(`Delete ${a.label || a.id}? This removes the JSON file.`)) return;
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}`, { method: "DELETE" });
          }
          await refresh();
        } catch (x) { alert("Action failed: " + x.message); }
      };

      const oauths = data ? data.auths.filter((a) => a.kind === "oauth") : [];
      const apikeys = data ? data.auths.filter((a) => a.kind === "apikey") : [];
      const totals = { in: 0, out: 0, req: 0, err: 0, in24: 0, out24: 0 };
      if (data) for (const a of data.auths) {
        const t = a.usage && a.usage.total;
        if (t) {
          totals.in += t.input_tokens || 0;
          totals.out += t.output_tokens || 0;
          totals.req += t.requests || 0;
          totals.err += t.errors || 0;
        }
        const h24 = a.usage && a.usage.sum_24h;
        if (h24) {
          totals.in24 += h24.input_tokens || 0;
          totals.out24 += h24.output_tokens || 0;
        }
      }

      return html`
        <div class="max-w-7xl mx-auto p-6 space-y-6">
          <header class="flex items-center justify-between">
            <div>
              <h1 class="text-2xl font-semibold">CPA-Claude</h1>
              <p class="text-sm text-slate-500">Active window: ${data ? data.active_window_minutes : "…"} min
              ${data && data.default_proxy_url ? html` · default proxy ${data.default_proxy_url}` : ""}</p>
            </div>
            <div class="flex gap-2">
              <button onClick=${() => setOauthing(true)} class="px-3 py-1.5 rounded-lg bg-slate-900 text-white hover:bg-slate-800 text-sm">Sign in with Claude</button>
              <button onClick=${() => setUploading(true)} class="px-3 py-1.5 rounded-lg border border-slate-300 text-sm hover:bg-slate-50">Upload JSON</button>
              <button onClick=${refresh} class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-50 text-sm">Refresh</button>
              <button onClick=${() => { setToken(""); onLogout(); }} class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-50 text-sm">Logout</button>
            </div>
          </header>

          ${err && html`<div class="rounded-lg bg-red-50 text-red-700 px-4 py-2 text-sm">${err}</div>`}

          <section class="grid grid-cols-2 md:grid-cols-6 gap-3">
            ${[
              ["OAuth", oauths.length],
              ["API keys", apikeys.length],
              ["24h in", fmtInt(totals.in24)],
              ["24h out", fmtInt(totals.out24)],
              ["Σ in", fmtInt(totals.in)],
              ["Σ out", fmtInt(totals.out)],
            ].map(([k, v]) => html`
              <div class="bg-white rounded-xl border border-slate-200 p-4">
                <div class="text-xs text-slate-500">${k}</div>
                <div class="mt-1 text-xl font-semibold">${v}</div>
              </div>
            `)}
          </section>

          <section class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-4 py-2 border-b border-slate-200 flex items-center justify-between">
              <h2 class="font-semibold">Credentials</h2>
              <span class="text-xs text-slate-400">updated ${fmtDate(new Date(lastTick).toISOString())}</span>
            </div>
            ${!data ? html`<div class="p-6 text-center text-slate-400">loading…</div>` :
              html`
              <table class="w-full text-sm">
                <thead class="text-left text-xs uppercase text-slate-500 border-b border-slate-200">
                  <tr>
                    <th class="py-2 px-3">Identity</th>
                    <th class="py-2 px-3">Kind</th>
                    <th class="py-2 px-3">Slots</th>
                    <th class="py-2 px-3">Proxy</th>
                    <th class="py-2 px-3">Token exp</th>
                    <th class="py-2 px-3">Total</th>
                    <th class="py-2 px-3">Last 24h</th>
                    <th class="py-2 px-3">14-day in+out</th>
                    <th class="py-2 px-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${[...oauths, ...apikeys].map((a) => html`<${AuthRow} key=${a.id} a=${a} onAction=${onAction} onEdit=${setEditing} />`)}
                </tbody>
              </table>
            `}
          </section>

          <section class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-4 py-2 border-b border-slate-200 flex items-center justify-between">
              <h2 class="font-semibold">Clients — week ${data && data.current_week ? data.current_week : "…"}</h2>
              <span class="text-xs text-slate-400">edit client_budgets in config.yaml</span>
            </div>
            ${!data ? html`<div class="p-6 text-center text-slate-400">loading…</div>` :
              !data.clients.length ? html`<div class="p-6 text-center text-slate-400 text-sm">No client usage recorded yet.</div>` :
              html`
              <table class="w-full text-sm">
                <thead class="text-left text-xs uppercase text-slate-500 border-b border-slate-200">
                  <tr>
                    <th class="py-2 px-3">Token</th>
                    <th class="py-2 px-3">Label</th>
                    <th class="py-2 px-3">Weekly spend</th>
                    <th class="py-2 px-3">Limit</th>
                    <th class="py-2 px-3">Total (all time)</th>
                    <th class="py-2 px-3">Last used</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.clients.map((cl) => html`
                    <tr class="border-b border-slate-100 hover:bg-slate-50/60">
                      <td class="py-3 px-3 mono text-xs">${cl.token}</td>
                      <td class="py-3 px-3">${cl.label || html`<span class="text-slate-400">—</span>`}</td>
                      <td class="py-3 px-3 mono text-xs">
                        <div class="font-semibold ${cl.blocked ? "text-red-600" : cl.weekly_limit && cl.weekly_usd / cl.weekly_limit > 0.8 ? "text-amber-700" : ""}">$${cl.weekly_usd.toFixed(4)}</div>
                        ${cl.weekly_limit > 0 && html`
                          <div class="mt-1 h-1.5 w-28 bg-slate-100 rounded overflow-hidden">
                            <div class=${"h-full " + (cl.blocked ? "bg-red-500" : cl.weekly_usd / cl.weekly_limit > 0.8 ? "bg-amber-500" : "bg-emerald-500")} style=${`width:${Math.min(100, Math.round(cl.weekly_usd / cl.weekly_limit * 100))}%`}></div>
                          </div>
                        `}
                      </td>
                      <td class="py-3 px-3 mono text-xs">${cl.weekly_limit > 0 ? "$" + cl.weekly_limit.toFixed(2) : html`<span class="text-slate-400">none</span>`}</td>
                      <td class="py-3 px-3 mono text-xs">
                        <div>$${cl.total.cost_usd.toFixed(4)}</div>
                        <div class="text-slate-500">${fmtInt(cl.total.requests)} req</div>
                      </td>
                      <td class="py-3 px-3 text-xs">${cl.last_used ? fmtDate(cl.last_used) : html`<span class="text-slate-400">—</span>`}</td>
                    </tr>
                  `)}
                </tbody>
              </table>
            `}
          </section>

          <${RequestsExplorer} />

          <details class="bg-white rounded-xl border border-slate-200">
            <summary class="px-4 py-2 border-b border-slate-200 font-semibold cursor-pointer">
              Pricing table
              <span class="text-xs font-normal text-slate-400 ml-2">${data && data.pricing ? Object.keys(data.pricing.models).length : "…"} models · edit in config.yaml pricing.models</span>
            </summary>
            ${data && data.pricing && html`
              <table class="w-full text-sm">
                <thead class="text-left text-xs uppercase text-slate-500 border-b border-slate-200">
                  <tr>
                    <th class="py-2 px-3">Model</th>
                    <th class="py-2 px-3">Input / 1M</th>
                    <th class="py-2 px-3">Output / 1M</th>
                    <th class="py-2 px-3">Cache-read / 1M</th>
                    <th class="py-2 px-3">Cache-create / 1M</th>
                  </tr>
                </thead>
                <tbody>
                  ${Object.entries(data.pricing.models).sort(([a],[b]) => a.localeCompare(b)).map(([name, p]) => html`
                    <tr class="border-b border-slate-100">
                      <td class="py-2 px-3 mono text-xs">${name}</td>
                      <td class="py-2 px-3 mono text-xs">$${p.input_per_1m.toFixed(2)}</td>
                      <td class="py-2 px-3 mono text-xs">$${p.output_per_1m.toFixed(2)}</td>
                      <td class="py-2 px-3 mono text-xs">$${p.cache_read_per_1m.toFixed(2)}</td>
                      <td class="py-2 px-3 mono text-xs">$${p.cache_create_per_1m.toFixed(2)}</td>
                    </tr>
                  `)}
                  <tr class="bg-slate-50">
                    <td class="py-2 px-3 mono text-xs text-slate-500">(default / fallback)</td>
                    <td class="py-2 px-3 mono text-xs">$${data.pricing.default.input_per_1m.toFixed(2)}</td>
                    <td class="py-2 px-3 mono text-xs">$${data.pricing.default.output_per_1m.toFixed(2)}</td>
                    <td class="py-2 px-3 mono text-xs">$${data.pricing.default.cache_read_per_1m.toFixed(2)}</td>
                    <td class="py-2 px-3 mono text-xs">$${data.pricing.default.cache_create_per_1m.toFixed(2)}</td>
                  </tr>
                </tbody>
              </table>
            `}
          </details>

          <footer class="text-xs text-slate-400 text-center py-4">
            v1 · OAuth credentials are mutable · API keys / access tokens / budgets are edited in config.yaml (restart required)
          </footer>

          ${editing && html`<${EditModal} auth=${editing} onClose=${() => setEditing(null)} onSaved=${() => { setEditing(null); refresh(); }} />`}
          ${uploading && html`<${UploadModal} onClose=${() => setUploading(false)} onSaved=${() => { setUploading(false); refresh(); }} />`}
          ${oauthing && html`<${OAuthModal} onClose=${() => setOauthing(false)} onSaved=${() => { setOauthing(false); refresh(); }} />`}
        </div>
      `;
    }

    function App() {
      const [authed, setAuthed] = useState(!!getToken());
      useEffect(() => {
        if (!authed) return;
        // Verify on mount.
        api("/admin/api/summary").catch((x) => {
          if (x.status === 401) { setToken(""); setAuthed(false); }
        });
      }, [authed]);
      return authed
        ? html`<${Dashboard} onLogout=${() => setAuthed(false)} />`
        : html`<${Login} onOk=${() => setAuthed(true)} />`;
    }

    render(h(App), document.getElementById("app"));
  </script>
</body>
</html>
