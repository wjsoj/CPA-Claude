<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPA-Claude Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Tailwind's CDN default darkMode is "media" — tracks the OS / browser
       preference automatically; no JS toggle needed. color-scheme hints
       native form controls to render dark too. */
    html { color-scheme: light dark; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
    [hidden] { display: none !important; }
    .badge { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    details>summary { list-style:none; cursor:pointer; }
    details>summary::-webkit-details-marker { display:none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100">
  <div id="app"></div>

  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.24.3";
    import { useState, useEffect, useCallback, useRef } from "https://esm.sh/preact@10.24.3/hooks";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(h);

    const TOKEN_KEY = "cpa.admin.token";
    const getToken = () => localStorage.getItem(TOKEN_KEY) || "";
    const setToken = (t) => { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); };

    // Derive the mount prefix from the current URL so the SPA works no
    // matter what admin_path the operator picked. Handles:
    //   /mgmt-console/          → /mgmt-console
    //   /mgmt-console/app/foo   → /mgmt-console
    //   /mngt-ctrl/             → /mngt-ctrl
    // All legacy call sites use "/admin/api/..." strings; we rewrite the
    // prefix here so the rest of the file stays untouched.
    const ADMIN_BASE = (() => {
      const p = window.location.pathname || "/";
      return p.replace(/\/(app(\/.*)?)?\/?$/, "") || "";
    })();

    async function api(path, opts = {}) {
      const token = getToken();
      // Backwards-compat: call sites wrote literal "/admin/..." strings;
      // swap that legacy prefix for the live mount base.
      if (path.startsWith("/admin/")) path = ADMIN_BASE + path.slice("/admin".length);
      const res = await fetch(path, {
        ...opts,
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": token,
          ...(opts.headers || {}),
        },
      });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
      if (!res.ok) {
        const err = new Error((data && data.error) || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    const fmtInt = (n) => (n == null ? "—" : Number(n).toLocaleString());

    // Client-side sk-<48 alphanumerics> generator. Mirrors the format from
    // clienttoken.Generate() on the backend so the two paths produce the
    // same shape. Lives on the client so the Add-token modal can pre-fill
    // without hitting the network and avoids a path conflict with
    // PATCH /tokens/:token.
    // Copy text to clipboard. navigator.clipboard requires a secure context
    // (HTTPS or localhost); when accessed over plain HTTP on a LAN IP it
    // simply doesn't exist. Fall back to the legacy execCommand approach.
    async function copyToClipboard(text) {
      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try { await navigator.clipboard.writeText(text); return; } catch {}
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function generateSkToken() {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const n = 48;
      const buf = new Uint32Array(n);
      crypto.getRandomValues(buf);
      let out = "sk-";
      for (let i = 0; i < n; i++) {
        out += alphabet[buf[i] % alphabet.length];
      }
      return out;
    }
    const fmtDate = (s) => {
      if (!s) return "—";
      const d = new Date(s);
      if (isNaN(d)) return "—";
      const diff = d.getTime() - Date.now();
      const abs = Math.abs(diff);
      const m = Math.round(abs / 60000);
      const h_ = Math.round(abs / 3600000);
      const day = Math.round(abs / 86400000);
      let rel = "";
      if (abs < 60000) rel = "now";
      else if (m < 60) rel = `${m}m`;
      else if (h_ < 48) rel = `${h_}h`;
      else rel = `${day}d`;
      return diff < 0 ? `${rel} ago` : `in ${rel}`;
    };

    function Login({ onOk }) {
      const [val, setVal] = useState("");
      const [err, setErr] = useState("");
      const submit = async (e) => {
        e.preventDefault();
        setErr("");
        setToken(val.trim());
        try {
          await api("/admin/api/summary");
          onOk();
        } catch (x) {
          setToken("");
          setErr(x.message || "auth failed");
        }
      };
      return html`
        <div class="min-h-screen flex items-center justify-center p-6">
          <form onSubmit=${submit} class="bg-white dark:bg-slate-800 shadow-xl rounded-2xl p-8 w-full max-w-sm space-y-4 border border-slate-200 dark:border-slate-700">
            <h1 class="text-2xl font-semibold">CPA-Claude Admin</h1>
            <p class="text-base text-slate-500 dark:text-slate-400">Enter admin token to continue.</p>
            <input
              type="password" autofocus
              class="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-400"
              placeholder="admin token"
              value=${val}
              onInput=${(e) => setVal(e.target.value)}
            />
            ${err && html`<div class="text-base text-red-600 dark:text-red-400">${err}</div>`}
            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white dark:bg-slate-200 dark:hover:bg-slate-300 dark:text-slate-900 font-medium py-2 rounded-lg">Sign in</button>
          </form>
        </div>
      `;
    }

    function Badge({ color = "slate", children }) {
      const palette = {
        slate: "bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200",
        green: "bg-emerald-100 text-emerald-700",
        red:   "bg-red-100 text-red-700",
        amber: "bg-amber-100 text-amber-800",
        blue:  "bg-blue-100 text-blue-700",
      };
      return html`<span class="badge ${palette[color] || palette.slate}">${children}</span>`;
    }

    function EditModal({ auth, onClose, onSaved }) {
      const [disabled, setDisabled] = useState(auth.disabled);
      const [maxC, setMaxC] = useState(auth.max_concurrent || 0);
      const [proxy, setProxy] = useState(auth.proxy_url || "");
      const [baseURL, setBaseURL] = useState(auth.base_url || "");
      const [label, setLabel] = useState(auth.label || "");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const isApiKey = auth.kind === "apikey";
      const save = async () => {
        setBusy(true); setErr("");
        try {
          const body = { disabled, proxy_url: proxy, label };
          if (!isApiKey) body.max_concurrent = Number(maxC);
          if (isApiKey) body.base_url = baseURL;
          await api(`/admin/api/auths/${encodeURIComponent(auth.id)}`, {
            method: "PATCH",
            body: JSON.stringify(body),
          });
          onSaved();
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      };
      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick=${onClose}>
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-center justify-between">
              <h2 class="text-xl font-semibold">Edit credential</h2>
              <button onClick=${onClose} class="text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-200">✕</button>
            </div>
            <div class="text-sm mono text-slate-500 dark:text-slate-400">${auth.id}</div>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">Label</span>
              <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-900" value=${label} onInput=${(e)=>setLabel(e.target.value)} />
            </label>
            ${!isApiKey && html`
              <label class="block">
                <span class="text-base text-slate-600 dark:text-slate-300">Max concurrent sessions</span>
                <input type="number" min="0" class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-900" value=${maxC} onInput=${(e)=>setMaxC(e.target.value)} />
                <span class="text-sm text-slate-400 dark:text-slate-500">0 = unlimited</span>
              </label>
            `}
            ${isApiKey && html`
              <label class="block">
                <span class="text-base text-slate-600 dark:text-slate-300">Base URL</span>
                <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900" placeholder="https://api.your-relay-vendor.com (default: api.anthropic.com)" value=${baseURL} onInput=${(e)=>setBaseURL(e.target.value)} />
                <span class="text-sm text-slate-400 dark:text-slate-500">Per-key upstream override; leave blank for Anthropic.</span>
              </label>
            `}
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">Proxy URL</span>
              <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900" placeholder="http://host:port or socks5://host:port" value=${proxy} onInput=${(e)=>setProxy(e.target.value)} />
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" checked=${disabled} onChange=${(e)=>setDisabled(e.target.checked)} />
              <span class="text-base">Disabled</span>
            </label>
            ${err && html`<div class="text-base text-red-600 dark:text-red-400">${err}</div>`}
            <div class="flex justify-end gap-2 pt-2">
              <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-700">Cancel</button>
              <button disabled=${busy} onClick=${save} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white dark:bg-slate-200 dark:hover:bg-slate-300 dark:text-slate-900 disabled:opacity-50">${busy ? "Saving..." : "Save"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function UploadModal({ onClose, onSaved }) {
      const [filename, setFilename] = useState("");
      const [content, setContent] = useState("");
      const [label, setLabel] = useState("");
      const [maxC, setMaxC] = useState(5);
      const [proxy, setProxy] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const fileInputRef = useRef(null);

      const onPick = () => fileInputRef.current && fileInputRef.current.click();
      const onFile = async (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        setFilename(f.name);
        setContent(await f.text());
      };
      const save = async () => {
        setBusy(true); setErr("");
        try {
          JSON.parse(content); // validate
          await api("/admin/api/auths/upload", {
            method: "POST",
            body: JSON.stringify({
              filename, content: JSON.parse(content),
              label, max_concurrent: Number(maxC), proxy_url: proxy,
            }),
          });
          onSaved();
        } catch (x) { setErr(x.message || String(x)); }
        finally { setBusy(false); }
      };
      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick=${onClose}>
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-center justify-between">
              <h2 class="text-xl font-semibold">Add OAuth credential</h2>
              <button onClick=${onClose} class="text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-200">✕</button>
            </div>
            <input type="file" accept=".json,application/json" ref=${fileInputRef} onChange=${onFile} class="hidden" />
            <div class="flex gap-2">
              <button onClick=${onPick} class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 text-base hover:bg-slate-50 dark:hover:bg-slate-700">Choose JSON file…</button>
              <input class="flex-1 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900 text-base" placeholder="filename (optional)" value=${filename} onInput=${(e)=>setFilename(e.target.value)} />
            </div>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">or paste JSON</span>
              <textarea class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono h-40 bg-white dark:bg-slate-900" value=${content} onInput=${(e)=>setContent(e.target.value)} placeholder='{"type":"claude","access_token":"...","refresh_token":"...","email":"..."}'></textarea>
            </label>
            <div class="grid grid-cols-2 gap-3">
              <label class="block">
                <span class="text-base text-slate-600 dark:text-slate-300">Label</span>
                <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-900" value=${label} onInput=${(e)=>setLabel(e.target.value)} />
              </label>
              <label class="block">
                <span class="text-base text-slate-600 dark:text-slate-300">Max concurrent</span>
                <input type="number" min="0" class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-900" value=${maxC} onInput=${(e)=>setMaxC(e.target.value)} />
              </label>
            </div>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">Proxy URL (optional)</span>
              <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900" placeholder="http:// or socks5://" value=${proxy} onInput=${(e)=>setProxy(e.target.value)} />
            </label>
            ${err && html`<div class="text-base text-red-600 dark:text-red-400 whitespace-pre-wrap">${err}</div>`}
            <div class="flex justify-end gap-2 pt-2">
              <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-700">Cancel</button>
              <button disabled=${busy || !content} onClick=${save} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white dark:bg-slate-200 dark:hover:bg-slate-300 dark:text-slate-900 disabled:opacity-50">${busy ? "Uploading..." : "Add"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function APIKeyModal({ onClose, onSaved }) {
      const [apiKey, setAPIKey] = useState("");
      const [label, setLabel] = useState("");
      const [proxy, setProxy] = useState("");
      const [baseURL, setBaseURL] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const save = async () => {
        setBusy(true); setErr("");
        try {
          await api("/admin/api/apikeys", {
            method: "POST",
            body: JSON.stringify({ api_key: apiKey.trim(), label: label.trim(), proxy_url: proxy.trim(), base_url: baseURL.trim() }),
          });
          onSaved();
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      };
      return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick=${onClose}>
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-center justify-between">
              <h2 class="text-xl font-semibold">Add API key</h2>
              <button onClick=${onClose} class="text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-200">✕</button>
            </div>
            <p class="text-base text-slate-500 dark:text-slate-400">Anthropic <span class="mono">sk-ant-api…</span> key. Stored as a JSON file in <span class="mono">auth_dir</span>, mutable from the panel. No per-key concurrency limit — used as the fallback when every OAuth is saturated or over quota.</p>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">API key</span>
              <input type="password" autofocus class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900" placeholder="sk-ant-api03-..." value=${apiKey} onInput=${(e)=>setAPIKey(e.target.value)} />
            </label>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">Label</span>
              <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-900" placeholder="primary" value=${label} onInput=${(e)=>setLabel(e.target.value)} />
            </label>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">Base URL (optional, for relay vendors)</span>
              <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900" placeholder="https://api.your-relay-vendor.com (default: api.anthropic.com)" value=${baseURL} onInput=${(e)=>setBaseURL(e.target.value)} />
              <span class="text-sm text-slate-400 dark:text-slate-500">Requests with this key go to <span class="mono">{base_url}/v1/messages</span>. Leave empty to hit Anthropic directly.</span>
            </label>
            <label class="block">
              <span class="text-base text-slate-600 dark:text-slate-300">Proxy URL (optional)</span>
              <input class="mt-1 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono bg-white dark:bg-slate-900" placeholder="http:// or socks5://" value=${proxy} onInput=${(e)=>setProxy(e.target.value)} />
            </label>
            ${err && html`<div class="text-base text-red-600 dark:text-red-400">${err}</div>`}
            <div class="flex justify-end gap-2 pt-2">
              <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-700">Cancel</button>
              <button disabled=${busy || !apiKey.trim()} onClick=${save} class="px-4 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white dark:bg-slate-200 dark:hover:bg-slate-300 dark:text-slate-900 disabled:opacity-50">${busy ? "Saving..." : "Add"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function UpstreamQuota({ auths }) {
      // Per-auth UI state: { [id]: { loading, error, data, ts } }
      const [state, setState] = useState({});
      const run = async (id) => {
        setState((s) => ({ ...s, [id]: { ...s[id], loading: true, error: "" } }));
        try {
          const d = await api(`/admin/api/auths/${encodeURIComponent(id)}/anthropic-usage`, { method: "POST" });
          setState((s) => ({ ...s, [id]: { loading: false, data: d, ts: Date.now() } }));
        } catch (x) {
          setState((s) => ({ ...s, [id]: { loading: false, error: x.message } }));
        }
      };
      const oauths = auths.filter((a) => a.kind === "oauth");
      if (oauths.length === 0) {
        return html`<div class="p-6 text-base text-slate-400 dark:text-slate-500">No OAuth credentials to query.</div>`;
      }
      const renderWindows = (usage) => {
        if (!usage || !usage.body) return null;
        // Schema cross-checked with CLIProxyAPI Management Center
        // (src/types/quota.ts: ClaudeUsagePayload). Real fields are:
        //   <window>.utilization  (0-100, already a percent)
        //   <window>.resets_at    (ISO8601 string)
        const keys = [
          ["five_hour", "5-hour"],
          ["seven_day", "7-day"],
          ["seven_day_oauth_apps", "7-day (OAuth apps)"],
          ["seven_day_opus", "7-day Opus"],
          ["seven_day_sonnet", "7-day Sonnet"],
          ["seven_day_cowork", "7-day Cowork"],
          ["iguana_necktie", "iguana_necktie"],
        ];
        const rows = keys
          .map(([k, label]) => [label, usage.body[k]])
          .filter(([, v]) => v && typeof v === "object" && (v.utilization != null || v.resets_at != null));
        const extra = usage.body.extra_usage;
        if (!rows.length && !extra) {
          return html`<pre class="mono text-xs text-slate-500 dark:text-slate-400 whitespace-pre-wrap">${JSON.stringify(usage.body, null, 2)}</pre>`;
        }
        const renderPctCell = (pctRaw) => {
          const pct = typeof pctRaw === "number" ? Math.round(pctRaw <= 1 ? pctRaw * 100 : pctRaw) : null;
          const color = pct == null ? "bg-slate-400" : pct >= 90 ? "bg-red-500" : pct >= 70 ? "bg-amber-500" : "bg-emerald-500";
          return { pct, color };
        };
        return html`
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
                <th class="py-2 pr-3 text-left font-medium">Window</th>
                <th class="py-2 text-right font-medium">Used</th>
                <th class="py-2 pl-2 font-medium">&nbsp;</th>
                <th class="py-2 pl-3 text-right font-medium">Resets</th>
              </tr>
            </thead>
            <tbody>
            ${rows.map(([label, w]) => {
              const { pct, color } = renderPctCell(w.utilization);
              return html`<tr class="border-b border-slate-100 dark:border-slate-700/60">
                <td class="py-2 pr-3">${label}</td>
                <td class="py-2 mono text-right">${pct != null ? pct + "%" : "—"}</td>
                <td class="py-2 pl-2 w-40">
                  ${pct != null && html`<div class="h-1.5 bg-slate-100 dark:bg-slate-700 rounded overflow-hidden"><div class=${"h-full " + color} style=${`width:${Math.min(100, pct)}%`}></div></div>`}
                </td>
                <td class="py-2 pl-3 text-right">
                  ${w.resets_at
                    ? html`<span class="mono text-sm text-slate-700 dark:text-slate-200">${fmtDate(w.resets_at)}</span>`
                    : html`<span class="text-xs text-slate-400 dark:text-slate-500">—</span>`}

    function Sparkline({ daily }) {
      // Fill missing days with zero so the sparkline width reflects real
      // elapsed time, not just days with activity.
      const map = Object.fromEntries(daily.map((d) => [d.date, d.counts]));
      const end = daily[daily.length - 1].date;
      const days = 14;
      const out = [];
      const endD = new Date(end + "T00:00:00Z");
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(endD);
        d.setUTCDate(endD.getUTCDate() - i);
        const key = d.toISOString().slice(0, 10);
        const c = map[key] || { input_tokens: 0, output_tokens: 0 };
        out.push({ date: key, val: (c.input_tokens || 0) + (c.output_tokens || 0) });
      }
      const max = Math.max(1, ...out.map((o) => o.val));
      return html`
        <div class="flex items-end gap-[2px] h-10 w-[88px]">
          ${out.map((o) => {
            const pct = Math.round((o.val / max) * 100);
            const hStyle = `height:${Math.max(pct, o.val > 0 ? 6 : 2)}%`;
            const title = `${o.date}: ${o.val.toLocaleString()} tokens`;
            return html`<div
              title=${title}
              class=${"w-[4px] rounded-sm " + (o.val > 0 ? "bg-slate-700" : "bg-slate-200")}
              style=${hStyle}
            ></div>`;
          })}
        </div>
      `;
    }

              </div>

    function AuthCard({ a, onAction, onEdit }) {
      const slot = a.max_concurrent > 0 ? `${a.active_clients} / ${a.max_concurrent}` : `${a.active_clients} / ∞`;
      const slotRatio = a.max_concurrent > 0 ? Math.min(100, Math.round(a.active_clients / a.max_concurrent * 100)) : 0;
      let status, statusTone;
      if (a.disabled) { status = "disabled"; statusTone = "bg-slate-400 dark:bg-slate-500"; }
      else if (a.quota_exceeded) { status = "quota"; statusTone = "bg-amber-500"; }
      else if (a.hard_failure) { status = "unhealthy"; statusTone = "bg-rose-600"; }
      else if (a.healthy) { status = "healthy"; statusTone = "bg-emerald-500"; }
      else { status = "degraded"; statusTone = "bg-amber-500"; }
      const u = a.usage;
      const kindLabel = a.kind === "apikey" ? "API key" : "OAuth";
      const btnBase = "px-3 py-1.5 rounded-md border text-sm font-medium transition";
      const btnNeutral = btnBase + " border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/60";
      const btnDanger = btnBase + " border-rose-300 dark:border-rose-700/60 text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/30";
      const btnAmber = btnBase + " border-amber-400 text-amber-700 dark:text-amber-300 hover:bg-amber-50 dark:hover:bg-amber-900/30";
      return html`
        <article class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow overflow-hidden">
          <header class="px-5 py-4 border-b border-slate-100 dark:border-slate-700/60 flex items-start justify-between gap-4">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <span class=${"inline-block w-2 h-2 rounded-full " + statusTone} title=${status}></span>
                <div class="text-lg font-semibold truncate">${a.label || a.id}</div>
              </div>
              <div class="mt-1 mono text-xs text-slate-400 dark:text-slate-500 truncate">${a.id}</div>
            </div>
            <div class="flex flex-col items-end gap-1 shrink-0">
              <span class=${"inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium " + (a.kind === "apikey" ? "bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300" : "bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200")}>${kindLabel}</span>
              <span class="text-xs text-slate-500 dark:text-slate-400 capitalize">${status}</span>
            </div>
          </header>

          ${a.quota_exceeded && html`
            <div class="px-5 py-3 bg-amber-50 dark:bg-amber-900/25 border-b border-amber-200 dark:border-amber-900/40 flex items-center justify-between gap-3 text-sm">
              <span class="text-amber-800 dark:text-amber-300 font-medium">Quota exceeded</span>
              <span class="text-amber-700 dark:text-amber-400 mono">
                ${a.quota_reset_at
                  ? html`resets ${fmtDate(a.quota_reset_at)}`

            </div>
          `}
          ${!a.quota_exceeded && a.failure_reason && html`
            <div class=${"px-5 py-3 border-b flex items-center justify-between gap-3 text-sm " + (a.hard_failure ? "bg-rose-50 dark:bg-rose-900/20 border-rose-200 dark:border-rose-900/40" : "bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-900/40")}>
              <span class=${"font-medium " + (a.hard_failure ? "text-rose-800 dark:text-rose-300" : "text-amber-800 dark:text-amber-300")}>${a.hard_failure ? "Unhealthy" : "Recent failure"}</span>
              <span class=${"mono text-xs truncate ml-3 " + (a.hard_failure ? "text-rose-700 dark:text-rose-400" : "text-amber-700 dark:text-amber-400")} title=${a.failure_reason}>${a.failure_reason}</span>

          <dl class="px-5 py-4 grid grid-cols-2 gap-x-6 gap-y-3 text-sm">

            <div>
              <dt class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">Token exp</dt>

          ${u && html`
            <div class="px-5 py-4 bg-slate-50 dark:bg-slate-900/40 border-y border-slate-100 dark:border-slate-700/60">
              <div class="grid grid-cols-3 gap-4 text-sm">

                  <div class="mt-1 mono">${fmtInt(u.sum_24h.input_tokens)} / ${fmtInt(u.sum_24h.output_tokens)}</div>
                </div>
                <div>
                  <div class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">Total req</div>
                  <div class="mt-1 mono">${fmtInt(u.total.requests)}${u.total.errors > 0 ? html` <span class="text-rose-600 dark:text-rose-400 text-xs">(${fmtInt(u.total.errors)} err)</span>` : ""}</div>
                </div>
                <div>
                  <div class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">14-day</div>
                  <div class="mt-1">${u.daily && u.daily.length ? html`<${Sparkline} daily=${u.daily} />` : html`<span class="text-slate-400 dark:text-slate-500 text-xs">no data</span>`}</div>
                </div>
              </div>
            </div>
          `}

          <footer class="px-5 py-3 flex gap-2 flex-wrap">
            ${a.kind === "oauth" && html`
              <button onClick=${() => onEdit(a)} class=${btnNeutral}>Edit</button>
              <button onClick=${() => onAction(a, "toggle")} class=${btnNeutral}>${a.disabled ? "Enable" : "Disable"}</button>
              <button onClick=${() => onAction(a, "refresh")} class=${btnNeutral}>Refresh token</button>
              ${a.quota_exceeded && html`<button onClick=${() => onAction(a, "clear-quota")} class=${btnAmber}>Clear quota</button>`}
              ${(a.hard_failure || (!a.healthy && !a.quota_exceeded && !a.disabled)) && html`<button onClick=${() => onAction(a, "clear-failure")} class=${btnAmber}>Mark healthy</button>`}
              <button onClick=${() => onAction(a, "delete")} class=${btnDanger + " ml-auto"}>Delete</button>
            `}
            ${a.kind === "apikey" && html`
              ${a.file_backed && html`
                <button onClick=${() => onEdit(a)} class=${btnNeutral}>Edit</button>
                <button onClick=${() => onAction(a, "toggle")} class=${btnNeutral}>${a.disabled ? "Enable" : "Disable"}</button>
              `}
              ${a.quota_exceeded && html`<button onClick=${() => onAction(a, "clear-quota")} class=${btnAmber}>Clear quota</button>`}
              ${(a.hard_failure || (!a.healthy && !a.quota_exceeded && !a.disabled)) && html`<button onClick=${() => onAction(a, "clear-failure")} class=${btnAmber}>Mark healthy</button>`}
              ${a.file_backed && html`<button onClick=${() => onAction(a, "delete")} class=${btnDanger + " ml-auto"}>Delete</button>`}
            `}
          </footer>
        </article>
      `;
    }

    function AddTokenModal({ onClose, onSaved }) {
      const [name, setName] = useState("");
      // Pre-filled with a fresh sk-... the moment the modal opens so the
      // user can simply hit Create to save-and-copy if they don't care
      // about the name/limit. The "Regenerate" button just overwrites it.
      const [token, setToken] = useState(() => generateSkToken());
      const [weekly, setWeekly] = useState("");
      const [created, setCreated] = useState(null); // once POSTed, display it large with copy
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const [copied, setCopied] = useState(false);

      const regen = () => { setToken(generateSkToken()); setCopied(false); };

      const copy = async () => {
        try {
          await copyToClipboard(created || token);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch {}
      };

      const save = async () => {
        setBusy(true); setErr("");
        try {
          const body = { token: token.trim(), name: name.trim() };
          const w = parseFloat(weekly);
          if (!isNaN(w) && w > 0) body.weekly_usd = w;
          const d = await api("/admin/api/tokens", { method: "POST", body: JSON.stringify(body) });
          setCreated(d.token);
        } catch (x) { setErr(x.message); }
        finally { setBusy(false); }
      };

      return html`
        <div class="fixed inset-0 bg-black/40 dark:bg-black/60 flex items-center justify-center z-50" onClick=${onClose}>
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-xl p-7 space-y-5" onClick=${(e) => e.stopPropagation()}>
            <div class="flex items-start justify-between">
              <h2 class="text-2xl font-semibold tracking-tight">${created ? "Token created" : "New client token"}</h2>
              <button onClick=${onClose} class="text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 text-xl leading-none">✕</button>
            </div>
            ${created ? html`
              <div class="space-y-4">
                <div class="text-base text-slate-600 dark:text-slate-300">
                  Save this token now — you won't see it again in full. Clients send it as
                  <span class="mono text-sm bg-slate-100 dark:bg-slate-900 px-1.5 py-0.5 rounded">Authorization: Bearer &lt;token&gt;</span>.
                </div>
                <div class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-3 mono text-sm break-all select-all">${created}</div>
                <div class="flex justify-between gap-3">
                  <button onClick=${copy} class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 text-base">${copied ? "Copied ✓" : "Copy to clipboard"}</button>
                  <button onClick=${onSaved} class="px-5 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 dark:bg-slate-200 dark:text-slate-900 dark:hover:bg-slate-300 text-base">Done</button>
                </div>
              </div>
            ` : html`
              <div class="space-y-4">
                <label class="block">
                  <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Name</span>
                  <input type="text" class="mt-1.5 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-white dark:bg-slate-900 text-base" placeholder="e.g. alice-laptop" value=${name} onInput=${(e) => setName(e.target.value)} />
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Token</span>
                  <div class="mt-1.5 flex gap-2">
                    <input type="text" class="flex-1 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono text-sm bg-white dark:bg-slate-900" value=${token} onInput=${(e) => setToken(e.target.value)} />
                    <button onClick=${regen} class="px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 text-sm shrink-0">Regenerate</button>
                  </div>
                  <span class="text-xs text-slate-500 dark:text-slate-400 mt-1 block">Format: <code class="mono">sk-</code> + 48 alphanumerics. You can paste an existing value here to import.</span>
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Weekly USD limit</span>
                  <input type="number" min="0" step="0.01" class="mt-1.5 w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 mono text-sm bg-white dark:bg-slate-900" placeholder="0 = unlimited" value=${weekly} onInput=${(e) => setWeekly(e.target.value)} />
                </label>
                ${err && html`<div class="text-sm text-rose-600 dark:text-rose-400">${err}</div>`}
                <div class="flex justify-end gap-3 pt-2">
                  <button onClick=${onClose} class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 text-base">Cancel</button>
                  <button disabled=${busy || !token.trim()} onClick=${save} class="px-5 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 dark:bg-slate-200 dark:text-slate-900 dark:hover:bg-slate-300 disabled:opacity-50 text-base">${busy ? "Creating…" : "Create"}</button>

              </div>

          </div>
        </div>
      `;

            <div class="flex items-start justify-between">

    function Dashboard({ onLogout }) {
      const [data, setData] = useState(null);
      const [err, setErr] = useState("");
      const [editing, setEditing] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [oauthing, setOauthing] = useState(false);
      const [apikeying, setAPIKeying] = useState(false);
      const [addingToken, setAddingToken] = useState(false);
      const [editingToken, setEditingToken] = useState(null);
      const [lastTick, setLastTick] = useState(Date.now());
      // Tab selection — split the dense page into focused views.
      // Persisted to localStorage so a refresh lands on the same view.
      const [tab, setTab] = useState(() => localStorage.getItem("cpa.admin.tab") || "overview");
      useEffect(() => { localStorage.setItem("cpa.admin.tab", tab); }, [tab]);
      // Bumped only on explicit Refresh click. Child components (e.g.
      // RequestsExplorer) watch this to know when to re-pull their own
      // data. The 10s auto-interval intentionally does NOT bump it — we
      // don't want the Requests pane silently re-running possibly
      // expensive queries every 10 seconds.
      const [refreshTick, setRefreshTick] = useState(0);

      const refresh = useCallback(async () => {
        try {
          const d = await api("/admin/api/summary");
          setData(d); setErr(""); setLastTick(Date.now());
        } catch (x) {
          if (x.status === 401) { setToken(""); onLogout(); return; }
          setErr(x.message);
        }
      }, [onLogout]);

      const manualRefresh = useCallback(() => {
        refresh();
        setRefreshTick((t) => t + 1);
      }, [refresh]);

      useEffect(() => { refresh(); const t = setInterval(refresh, 10000); return () => clearInterval(t); }, [refresh]);

      const onDeleteToken = async (cl) => {
        if (!cl.full_token) return;
        if (!confirm(`Delete token "${cl.label || cl.token}"? This cannot be undone; clients using it will stop working.`)) return;
        try {
          await api(`/admin/api/tokens/${encodeURIComponent(cl.full_token)}`, { method: "DELETE" });
          await refresh();
        } catch (x) { alert("Delete failed: " + x.message); }
      };

      const onAction = async (a, act) => {
        try {
          if (act === "toggle") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}`, {
              method: "PATCH",
              body: JSON.stringify({ disabled: !a.disabled }),
            });
          } else if (act === "refresh") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}/refresh`, { method: "POST" });
          } else if (act === "clear-quota") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}/clear-quota`, { method: "POST" });
          } else if (act === "clear-failure") {
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}/clear-failure`, { method: "POST" });
          } else if (act === "delete") {
            if (!confirm(`Delete ${a.label || a.id}? This removes the JSON file.`)) return;
            await api(`/admin/api/auths/${encodeURIComponent(a.id)}`, { method: "DELETE" });
          }
          await refresh();
        } catch (x) { alert("Action failed: " + x.message); }
      };

      const oauths = data ? data.auths.filter((a) => a.kind === "oauth") : [];
      const apikeys = data ? data.auths.filter((a) => a.kind === "apikey") : [];
      const totalCreds = oauths.length + apikeys.length;
      const healthyCreds = data ? data.auths.filter((a) => a.healthy).length : 0;
      const healthLabel = healthyCreds + " / " + totalCreds + " healthy";
      const totals = { in: 0, out: 0, req: 0, err: 0, in24: 0, out24: 0 };
      if (data) for (const a of data.auths) {
        const t = a.usage && a.usage.total;
        if (t) {
          totals.in += t.input_tokens || 0;
          totals.out += t.output_tokens || 0;
          totals.req += t.requests || 0;
          totals.err += t.errors || 0;
        }
        const h24 = a.usage && a.usage.sum_24h;
        if (h24) {
          totals.in24 += h24.input_tokens || 0;
          totals.out24 += h24.output_tokens || 0;
        }
      }

      return html`
        <div class="max-w-7xl mx-auto p-8 space-y-8">
          <header class="flex items-center justify-between">
            <div>
              <h1 class="text-4xl font-semibold tracking-tight">CPA-Claude</h1>
              <p class="text-base text-slate-500 dark:text-slate-400">Active window: ${data ? data.active_window_minutes : "…"} min
              ${data && data.default_proxy_url ? html` · default proxy ${data.default_proxy_url}` : ""}</p>
            </div>
            <div class="flex gap-2">
              <button onClick=${() => setOauthing(true)} class="px-3 py-1.5 rounded-lg bg-slate-900 text-white hover:bg-slate-800 dark:bg-slate-200 dark:text-slate-900 dark:hover:bg-slate-300 text-base">Sign in with Claude</button>
              <button onClick=${() => setAPIKeying(true)} class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 text-base hover:bg-slate-50 dark:hover:bg-slate-700">Add API key</button>
              <button onClick=${() => setUploading(true)} class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 text-base hover:bg-slate-50 dark:hover:bg-slate-700">Upload JSON</button>
              <button onClick=${manualRefresh} class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-700 text-base">Refresh</button>
              <button onClick=${() => { setToken(""); onLogout(); }} class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-700 text-base">Logout</button>
            </div>
          </header>

          ${err && html`<div class="rounded-lg bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300 px-4 py-2 text-base">${err}</div>`}

          <section class="grid grid-cols-2 md:grid-cols-6 gap-4">
            ${[
              ["Credentials", healthLabel],
              ["OAuth", oauths.length],
              ["API keys", apikeys.length],
              ["24h in", fmtInt(totals.in24)],
              ["Σ in", fmtInt(totals.in)],
              ["Σ out", fmtInt(totals.out)],
            ].map(([k, v]) => html`
              <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 dark:border-slate-700 p-5">
                <div class="text-sm text-slate-500 dark:text-slate-400">${k}</div>
                <div class="mt-2 text-2xl font-semibold">${v}</div>
              </div>
            `)}
          </section>

          <nav class="flex gap-2 border-b border-slate-200 dark:border-slate-700 -mb-2">
            ${[
              ["overview", "Overview"],
              ["requests", "Requests"],
              ["pricing", "Pricing"],
            ].map(([k, label]) => html`
              <button onClick=${() => setTab(k)} class=${"px-5 py-3 text-lg font-medium border-b-2 -mb-px transition " + (tab === k ? "border-slate-900 text-slate-900 dark:border-slate-100 dark:text-slate-100" : "border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200")}>${label}</button>
            `)}
          </nav>

          ${tab === "overview" && html`
          <section>
            <div class="flex items-baseline justify-between mb-4">
              <h2 class="text-2xl font-semibold tracking-tight">Credentials</h2>
              <span class="text-sm text-slate-500 dark:text-slate-400">updated ${fmtDate(new Date(lastTick).toISOString())}</span>
            </div>
            ${!data ? html`<div class="p-10 text-center text-slate-400 dark:text-slate-500 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">loading…</div>` :
              ([...oauths, ...apikeys].length === 0 ? html`<div class="p-10 text-center text-slate-400 dark:text-slate-500 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">No credentials yet — use the buttons above to add one.</div>` :
              html`
              <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                ${[...oauths, ...apikeys].map((a) => html`<${AuthCard} key=${a.id} a=${a} onAction=${onAction} onEdit=${setEditing} />`)}
              </div>
            `)}
          </section>

          <section>
            <div class="flex items-baseline justify-between mb-4 gap-4 flex-wrap">
              <h2 class="text-2xl font-semibold tracking-tight">Client tokens <span class="text-base font-normal text-slate-500 dark:text-slate-400 ml-2">week ${data && data.current_week ? data.current_week : "…"}</span></h2>
              <button onClick=${() => setAddingToken(true)} class="px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 dark:bg-slate-200 dark:text-slate-900 dark:hover:bg-slate-300 text-base font-medium">+ New token</button>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
            ${!data ? html`<div class="p-10 text-center text-slate-400 dark:text-slate-500">loading…</div>` :
              !data.clients.length ? html`<div class="p-10 text-center text-slate-400 dark:text-slate-500">No client tokens yet — click <b>New token</b> above, or the proxy is running in open mode.</div>` :
              html`
              <div class="overflow-x-auto">
              <table class="w-full text-base">
                <thead class="text-left text-sm uppercase text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
                  <tr>
                    <th class="py-3 px-4">Name</th>
                    <th class="py-3 px-4">Token</th>
                    <th class="py-3 px-4">Weekly spend</th>
                    <th class="py-3 px-4">Limit</th>
                    <th class="py-3 px-4">Total</th>
                    <th class="py-3 px-4">Last used</th>
                    <th class="py-3 px-4 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.clients.map((cl) => html`
                    <tr class="border-b border-slate-100 dark:border-slate-700/60 hover:bg-slate-50/60 dark:hover:bg-slate-700/40">
                      <td class="py-3 px-4">
                        <div class="font-medium">${cl.label || html`<span class="text-slate-400 dark:text-slate-500">(unnamed)</span>`}</div>
                        ${cl.from_config && html`<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">from config.yaml · read-only</div>`}
                      </td>
                      <td class="py-3 px-4 mono text-sm">${cl.token}</td>
                      <td class="py-3 px-4 mono text-sm">
                        <div class=${"font-semibold " + (cl.blocked ? "text-rose-600 dark:text-rose-400" : cl.weekly_limit && cl.weekly_usd / cl.weekly_limit > 0.8 ? "text-amber-600 dark:text-amber-400" : "")}>$${cl.weekly_usd.toFixed(4)}</div>
                        ${cl.weekly_limit > 0 && html`
                          <div class="mt-1 h-1.5 w-28 bg-slate-100 dark:bg-slate-700 rounded overflow-hidden">
                            <div class=${"h-full " + (cl.blocked ? "bg-rose-500" : cl.weekly_usd / cl.weekly_limit > 0.8 ? "bg-amber-500" : "bg-emerald-500")} style=${`width:${Math.min(100, Math.round(cl.weekly_usd / cl.weekly_limit * 100))}%`}></div>
                          </div>
                        `}
                      </td>
                      <td class="py-3 px-4 mono text-sm">${cl.weekly_limit > 0 ? "$" + cl.weekly_limit.toFixed(2) : html`<span class="text-slate-400 dark:text-slate-500">none</span>`}</td>
                      <td class="py-3 px-4 mono text-sm">
                        <div>$${cl.total.cost_usd.toFixed(4)}</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400">${fmtInt(cl.total.requests)} req</div>
                      </td>
                      <td class="py-3 px-4 text-sm">${cl.last_used ? fmtDate(cl.last_used) : html`<span class="text-slate-400 dark:text-slate-500">—</span>`}</td>
                      <td class="py-3 px-4 text-right">
                        ${cl.full_token ? html`
                          <div class="flex gap-2 justify-end">
                            <button onClick=${() => setEditingToken(cl)} class="px-3 py-1 rounded-md border border-slate-300 dark:border-slate-600 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">Edit</button>
                            ${cl.managed && html`<button onClick=${() => onDeleteToken(cl)} class="px-3 py-1 rounded-md border border-rose-300 dark:border-rose-700/60 text-rose-600 dark:text-rose-400 text-sm hover:bg-rose-50 dark:hover:bg-rose-900/30">Delete</button>`}
                          </div>
                        ` : html`<span class="text-xs text-slate-400 dark:text-slate-500">—</span>`}
                      </td>
                    </tr>
                  `)}
                </tbody>
              </table>
              </div>
            `}
            </div>
          </section>

          <section>
            <div class="flex items-baseline justify-between mb-4">
              <h2 class="text-2xl font-semibold tracking-tight">Upstream quota</h2>
              <span class="text-sm text-slate-500 dark:text-slate-400">manual · each query goes through that credential's proxy</span>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
              ${!data ? html`<div class="p-10 text-center text-slate-400 dark:text-slate-500">loading…</div>` : html`<${UpstreamQuota} auths=${data.auths} />`}
            </div>
          </section>
          `}

          ${tab === "requests" && html`
          <${RequestsExplorer} refreshTick=${refreshTick} />
          `}

          ${tab === "pricing" && html`
          <section>
            <div class="flex items-baseline justify-between mb-4">
              <h2 class="text-2xl font-semibold tracking-tight">Pricing table</h2>
              <span class="text-sm text-slate-500 dark:text-slate-400">${data && data.pricing ? Object.keys(data.pricing.models).length : "…"} models · edit in config.yaml pricing.models</span>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
            ${data && data.pricing && html`
              <div class="overflow-x-auto">
              <table class="w-full text-base">
                <thead class="text-left text-sm uppercase text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
                  <tr>
                    <th class="py-2 px-3">Model</th>
                    <th class="py-2 px-3">Input / 1M</th>
                    <th class="py-2 px-3">Output / 1M</th>
                    <th class="py-2 px-3">Cache-read / 1M</th>
                    <th class="py-2 px-3">Cache-create / 1M</th>
                  </tr>
                </thead>
                <tbody>
                  ${Object.entries(data.pricing.models).sort(([a],[b]) => a.localeCompare(b)).map(([name, p]) => html`
                    <tr class="border-b border-slate-100 dark:border-slate-700/60">
                      <td class="py-2 px-3 mono text-sm">${name}</td>
                      <td class="py-2 px-3 mono text-sm">$${p.input_per_1m.toFixed(2)}</td>
                      <td class="py-2 px-3 mono text-sm">$${p.output_per_1m.toFixed(2)}</td>
                      <td class="py-2 px-3 mono text-sm">$${p.cache_read_per_1m.toFixed(2)}</td>
                      <td class="py-2 px-3 mono text-sm">$${p.cache_create_per_1m.toFixed(2)}</td>
                    </tr>
                  `)}
                  <tr class="bg-slate-50">
                    <td class="py-2 px-3 mono text-sm text-slate-500 dark:text-slate-400">(default / fallback)</td>
                    <td class="py-2 px-3 mono text-sm">$${data.pricing.default.input_per_1m.toFixed(2)}</td>
                    <td class="py-2 px-3 mono text-sm">$${data.pricing.default.output_per_1m.toFixed(2)}</td>
                    <td class="py-2 px-3 mono text-sm">$${data.pricing.default.cache_read_per_1m.toFixed(2)}</td>
                    <td class="py-2 px-3 mono text-sm">$${data.pricing.default.cache_create_per_1m.toFixed(2)}</td>
                  </tr>
                </tbody>
              </table>
              </div>
            `}
            </div>
          </section>
          `}

          <footer class="text-sm text-slate-400 dark:text-slate-500 text-center py-4">
            v1 · credentials and client tokens are mutable from the panel · config.yaml-defined entries stay read-only
          </footer>

          ${editing && html`<${EditModal} auth=${editing} onClose=${() => setEditing(null)} onSaved=${() => { setEditing(null); refresh(); }} />`}
          ${uploading && html`<${UploadModal} onClose=${() => setUploading(false)} onSaved=${() => { setUploading(false); refresh(); }} />`}
          ${oauthing && html`<${OAuthModal} onClose=${() => setOauthing(false)} onSaved=${() => { setOauthing(false); refresh(); }} />`}
          ${apikeying && html`<${APIKeyModal} onClose=${() => setAPIKeying(false)} onSaved=${() => { setAPIKeying(false); refresh(); }} />`}
          ${addingToken && html`<${AddTokenModal} onClose=${() => setAddingToken(false)} onSaved=${() => { setAddingToken(false); refresh(); }} />`}
          ${editingToken && html`<${EditTokenModal} row=${editingToken} onClose=${() => setEditingToken(null)} onSaved=${() => { setEditingToken(null); refresh(); }} />`}
        </div>
      `;
    }

    function App() {
      const [authed, setAuthed] = useState(!!getToken());
      useEffect(() => {
        if (!authed) return;
        // Verify on mount.
        api("/admin/api/summary").catch((x) => {
          if (x.status === 401) { setToken(""); setAuthed(false); }
        });
      }, [authed]);
      return authed
        ? html`<${Dashboard} onLogout=${() => setAuthed(false)} />`
        : html`<${Login} onOk=${() => setAuthed(true)} />`;
    }

    render(h(App), document.getElementById("app"));
  </script>
</body>
</html>
